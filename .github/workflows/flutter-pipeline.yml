name: Flutter CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.6'
  JAVA_VERSION: '17'

jobs:
  # Analyze code and run tests
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Install lcov
        if: github.event_name == 'pull_request'
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: Run tests with coverage on PRs
        if: github.event_name == 'pull_request'
        run: flutter test --coverage

      - name: Log test coverage
        if: github.event_name == 'pull_request'
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "Coverage summary:"
            lcov --summary coverage/lcov.info
          else
            echo "Coverage file not found; no coverage data was generated."
          fi

      - name: Run tests on pushes
        if: github.event_name == 'push'
        run: flutter test

  # Build Android APK
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # Build Android App Bundle
  build-android-aab:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # Build iOS
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  # Build macOS
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/journal_app.app
          retention-days: 30

  # Build Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release
          retention-days: 30

  # Build Linux
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libx11-dev \
            pkg-config \
            cmake \
            ninja-build \
            libblkid-dev \
            liblzma-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle
          retention-days: 30

  # Summary job that depends on all builds
  build-complete:
    name: Build Complete
    runs-on: ubuntu-latest
    needs: [analyze, build-android-apk, build-android-aab, build-ios, build-macos, build-windows, build-linux]
    if: github.event_name == 'push' && always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.analyze.result }}" == "failure" ] || \
             [ "${{ needs.build-android-apk.result }}" == "failure" ] || \
             [ "${{ needs.build-android-aab.result }}" == "failure" ] || \
             [ "${{ needs.build-ios.result }}" == "failure" ] || \
             [ "${{ needs.build-macos.result }}" == "failure" ] || \
             [ "${{ needs.build-windows.result }}" == "failure" ] || \
             [ "${{ needs.build-linux.result }}" == "failure" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs completed successfully!"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact summary
        run: |
          echo "Build artifacts collected:"
          find artifacts -type f -name "*.apk" -o -name "*.aab"

